# ============================================================
# Docker Compose — Server Override
# ============================================================
# Menimpa URL ke domain production.
# Pakai bersama docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.server.yml up --build -d
# ============================================================

services:
  app:
    environment:
      NEXTAUTH_URL: ${APP_URL}
      NEXT_PUBLIC_API_URL: ${APP_URL}/api
